      { id: 'va23', name: '穿山甲', target: '哺乳類', img: 'https://images.unsplash.com/photo-1564349683136-77e08dba1ef7?w=150', rawId: '1SRGK6rMSDNm3wMiQpL9_XUTUq5WCQBO4' }
    ];

    const VERT_KNOWLEDGE_CARDS = [
      { name: "魚類 (軟骨與硬骨)", text: "生活於水中，終生用鰓呼吸。軟骨魚（如鯊魚、魟魚）骨骼全為軟骨，無鰓蓋、具鰓裂；硬骨魚（如吳郭魚、彈塗魚）具硬骨、有鰓蓋。" },
      { name: "兩生類", text: "幼體生活於水中用鰓呼吸；成體生活於陸地，用肺與濕潤皮膚輔助呼吸。體外受精、卵生、外溫，皮膚無法防水需居潮濕環境。" },
      { name: "爬蟲類", text: "完全適應陸地生活。體表具角質鱗片或骨板防水分散失。用肺呼吸，體內受精，產下具保護殼的卵，為外溫動物。" },
      { name: "鳥類", text: "體表有羽毛以利飛行與保暖，前肢特化為翼。骨骼中空輕盈，肺延伸出氣囊輔助呼吸，具瞬膜保護眼睛。內溫、體內受精、卵生。" },
      { name: "哺乳類", text: "內溫動物，體表有毛。具乳腺能分泌乳汁哺育幼兒。體內受精，多數為胎生（僅原始針鼴、鴨嘴獸為卵生）。" }
    ];

    const VERT_QUIZ_DATA = [
      { id: 'vq1', question: "鯊魚、魟魚與吳郭魚、彈塗魚同屬魚類，牠們最主要的體內構造差異是？", options: ["呼吸器官不同", "心臟房室數目不同", "骨骼有軟骨與硬骨的分別", "受精方式不同"], answer: 2, explanation: "鯊魚與魟魚屬於軟骨魚綱，骨骼全為軟骨；吳郭魚與彈塗魚則屬於硬骨魚綱，骨骼主要由硬骨組成。" },
      { id: 'vq2', question: "青蛙和山椒魚屬於兩生類，牠們為什麼不能完全離開陰暗潮濕的環境？", options: ["因為牠們完全用鰓呼吸", "因為牠們的皮膚無法防止水分散失，且肺不發達需靠濕潤皮膚輔助呼吸", "因為牠們是內溫動物", "因為牠們只吃水中的昆蟲"], answer: 1, explanation: "兩生類體表裸露沒有鱗片或毛髮阻擋水分散失，且成體肺部發育不完全，高度依賴濕潤的皮膚來進行氣體交換，因此無法離開潮濕環境。" },
      { id: 'vq3', question: "蜥蜴、蛇和烏龜比青蛙更能適應乾燥的陸地生活，最關鍵的特徵是？", options: ["體表具有鱗片或骨板防水分散失", "心臟具有兩心房兩心室", "四肢變得更加粗壯", "改用皮膚進行呼吸"], answer: 0, explanation: "爬蟲類體表具有角質鱗片或骨板，能有效防止體內水分蒸散，這是牠們能完全征服陸地、適應乾燥環境的關鍵構造。" },
      { id: 'vq4', question: "鳥類的骨骼具有「中空、輕盈」的特徵，這在演化上的主要適應意義為何？", options: ["方便產下體型較大的卵", "降低體溫以適應高空環境", "減輕體重以利於飛行", "增加骨髓儲存脂肪的空間"], answer: 2, explanation: "鳥類骨骼中空且質輕，配上流線型體型與特化的羽毛、氣囊，都是為了減輕體重、提高飛行效率的演化適應。" },
      { id: 'vq5', question: "蝙蝠會飛，海豚生活在海裡。請問牠們在分類上屬於哪一類動物？", options: ["蝙蝠是鳥類，海豚是魚類", "蝙蝠是哺乳類，海豚是魚類", "蝙蝠是鳥類，海豚是哺乳類", "兩者皆屬於哺乳類"], answer: 3, explanation: "蝙蝠與海豚雖然外觀與生活環境不同，但牠們都具備「胎生、哺乳、體表有毛、分泌乳汁」的特徵，皆屬於哺乳類。" },
      { id: 'vq6', question: "脊椎動物中，屬於「內溫動物(恆溫)」的組合是？", options: ["鳥類、哺乳類", "魚類、兩生類、爬蟲類", "爬蟲類、鳥類", "兩生類、哺乳類"], answer: 0, explanation: "鳥類和哺乳類能靠體內代謝产生熱量並維持恆定的體溫，屬於內溫動物；魚類、兩生類、爬蟲類則會隨環境改變體溫，為外溫動物。" },
      { id: 'vq7', question: "鴨嘴獸和針鼴雖然會「產卵」(卵生)，但科學家仍將牠們歸類為「哺乳類」的原因是？", options: ["體溫是變溫動物", "牠們具有羽毛構造", "牠們具有乳腺，會分泌乳汁哺育幼兒", "體生活在陸地上"], answer: 2, explanation: "哺乳類最核心的定義特徵是「具備乳腺能哺乳」。鴨嘴獸與針鼴是演化上最原始的哺乳類，雖然卵生，但仍用乳汁哺育後代。" },
      { id: 'vq8', question: "下列哪一種生物屬於兩生類、且「終生保有尾巴」？", options: ["青蛙", "山椒魚", "壁虎", "海龜"], answer: 1, explanation: "山椒魚屬於兩生類中的「有尾目」，成體依然保有尾巴。青蛙屬於無尾目；壁虎和烏龜則是爬蟲類。" },
      { id: 'vq9', question: "關於鳥類「氣囊」的功能，下列敘述何者正確？", options: ["可以代替肺進行氣體交換", "能儲存空氣輔助呼吸，並在飛行時幫助散熱與減輕比重", "用來消化未磨碎的穀物", "是用來發出聲音的鳴叫構造"], answer: 1, explanation: "鳥類的氣囊不直接進行氣體交換，但能儲存空氣讓肺部在吸氣與呼氣時都能獲得氧氣（雙重呼吸），並協助散熱與減輕比重。" },
      { id: 'vq10', question: "海龜、海豚、海馬三種生活在海中的脊椎動物，其分類由演化先到後依序為？", options: ["魚類 ➔ 爬蟲類 ➔ 哺乳類", "爬蟲類 ➔ 哺乳類 ➔ 魚類", "魚類 ➔ 哺乳類 ➔ 爬蟲類", "哺乳類 ➔ 爬蟲類 ➔ 魚類"], answer: 0, explanation: "海馬是用鰓呼吸的硬骨「魚類」；海龜是用肺呼吸、有骨板的「爬蟲類」；海豚則是胎生哺乳的「哺乳類」，故依演化順序為魚類➔爬蟲類➔哺乳類。" }
    ];

    function App() {
      const [userRole, setUserRole] = useState('login');
      const [studentClass, setStudentClass] = useState('701');
      const [studentName, setStudentName] = useState('');
      const [studentSeat, setStudentSeat] = useState('');
      
      const [gameMode, setGameMode] = useState('invert');
      const [activeTab, setActiveTab] = useState('knowledge');
      const [vertSubTab, setVertSubTab] = useState('feature');

      const [teacherTab, setTeacherTab] = useState('invert_scores');
      const [config, setConfig] = useState({ invertebrateOpen: true, vertebrateOpen: true });
      const [studentScores, setStudentScores] = useState([]); 
      const [refreshTrigger, setRefreshTrigger] = useState(0);
      const [teacherSelectClass, setTeacherSelectClass] = useState('ALL');
      
      const [wrongCount, setWrongCount] = useState(0); 
      const [isQuizSubmitted, setIsQuizSubmitted] = useState(false);
      const [userQuizAnswers, setUserQuizAnswers] = useState({});
      const [finalQuizScore, setFinalQuizScore] = useState(0);       
      
      const [selectedCard, setSelectedCard] = useState(null); 
      const [errorCardId, setErrorCardId] = useState(null);
      const [matchedCards, setMatchedCards] = useState([]);
      const [seed, setSeed] = useState(0);                   

      const [vertMatchedFeatures, setVertMatchedFeatures] = useState([]);
      const [vertMatchedAnimals, setVertMatchedAnimals] = useState([]);   
      const [selectedVertFeature, setSelectedVertFeature] = useState(null);
      const [selectedVertAnimal, setSelectedVertAnimal] = useState(null);
      const [vertFeatureErrorId, setVertFeatureErrorId] = useState(null);
      const [vertAnimalErrorId, setVertAnimalErrorId] = useState(null);

      const [isSavingProgress, setIsSavingProgress] = useState(false);

      const shuffledVertFeatures = useMemo(() => {
        const remaining = VERT_FEATURE_CARDS.filter(f => !vertMatchedFeatures.some(m => m.id === f.id));
        return shuffleArray(remaining);
      }, [vertMatchedFeatures, seed]);

      const poolVertAnimals = useMemo(() => {
        const remaining = VERT_ANIMAL_CARDS.filter(f => !vertMatchedAnimals.some(m => m.id === f.id));
        return shuffleArray(remaining);
      }, [vertMatchedAnimals, seed]);

      const poolCards = useMemo(() => {
        const remaining = INVERT_CARDS_DATA.filter(c => !matchedCards.some(m => m.id === c.id));
        return shuffleArray(remaining);
      }, [matchedCards, seed]);

      const totalCardsCount = gameMode === 'invert' ? INVERT_CARDS_DATA.length : (VERT_FEATURE_CARDS.length + VERT_ANIMAL_CARDS.length);

      const matchScore = useMemo(() => {
        if (gameMode === 'invert') {
          if (matchedCards.length === 0) return 0;
          return Math.max(0, Math.min(100, Math.round((matchedCards.length * (100 / INVERT_CARDS_DATA.length)) - wrongCount)));
        } else {
          const totalMatched = vertMatchedFeatures.length + vertMatchedAnimals.length;
          if (totalMatched === 0) return 0;
          return Math.max(0, Math.min(100, Math.round((totalMatched * (100 / totalCardsCount)) - wrongCount)));
        }
      }, [matchedCards, vertMatchedFeatures, vertMatchedAnimals, wrongCount, gameMode]);

      const filteredScores = useMemo(() => {
        const targetChapter = teacherTab === 'invert_scores' ? '無脊椎動物' : '脊椎動物';
        let step1 = studentScores.filter(score => score.chapterName === targetChapter);
        if (teacherSelectClass === 'ALL') return step1;
        return step1.filter(score => score.class === teacherSelectClass);
      }, [studentScores, teacherTab, teacherSelectClass]);

      useEffect(() => {
        const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('config')
          .onSnapshot((doc) => { 
            if (doc.exists) {
              const data = doc.data();
              setConfig({
                invertebrateOpen: data.invertebrateOpen !== undefined ? data.invertebrateOpen : true,
                vertebrateOpen: data.vertebrateOpen !== undefined ? data.vertebrateOpen : true
              }); 
            }
          }, (err) => console.log(err));
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (userRole === 'teacher_admin') {
          const unsubscribeScores = db.collection('artifacts').doc(appId).collection('student_scores')
            .orderBy('timestamp', 'desc')
            .onSnapshot((snapshot) => {
              const scoresData = [];
              snapshot.forEach((doc) => {
                scoresData.push({ id: doc.id, ...doc.data() });
              });
              setStudentScores(scoresData);
            }, (err) => console.error(err));
          return () => unsubscribeScores();
        }
      }, [userRole, refreshTrigger]);

      const startChapter = (mode) => {
        setGameMode(mode);
        setWrongCount(0);
        setIsQuizSubmitted(false);
        setUserQuizAnswers({});
        setFinalQuizScore(0);
        setSelectedCard(null);
        setMatchedCards([]);
        setVertMatchedFeatures([]);
        setVertMatchedAnimals([]);
        setSelectedVertFeature(null);
        setSelectedVertAnimal(null);
        setVertSubTab('feature');
        setActiveTab('knowledge');
        setSeed(prev => prev + 1);
        const docId = `${studentClass}_${studentSeat}_${studentName}_${mode}`;
        
        db.collection('artifacts').doc(appId).collection('student_drafts').doc(docId).get()
          .then((doc) => {
            if (doc.exists) {
              const data = doc.data();
              if (window.confirm(`✨ 發現你在上次課堂中有未完成的【${mode==='invert'?'無脊椎':'脊椎'}動物】進度！\n是否幫你載入舊紀錄繼續挑戰？`)) {
                setWrongCount(data.wrongCount || 0);
                setUserQuizAnswers(data.userQuizAnswers || {});
                if (mode === 'invert') {
                  setMatchedCards(data.matchedCards || []);
                } else {
                  setVertMatchedFeatures(data.vertMatchedFeatures || []);
                  setVertMatchedAnimals(data.vertMatchedAnimals || []);
                }
                alert('🎉 進度讀取成功，請繼續加油！');
              }
            }
          })
          .catch(err => console.log("讀取進度失敗:", err))
          .finally(() => {
            setUserRole('game_core');
          });
      };

      const saveStudentProgress = () => {
        setIsSavingProgress(true);
        const docId = `${studentClass}_${studentSeat}_${studentName}_${gameMode}`;
        const draftData = {
          class: studentClass,
          seat: studentSeat,
          name: studentName,
          gameMode,
          wrongCount,
          userQuizAnswers,
          lastUpdated: new Date().toLocaleString(),
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        if (gameMode === 'invert') {
          draftData.matchedCards = matchedCards;
        } else {
          draftData.vertMatchedFeatures = vertMatchedFeatures;
          draftData.vertMatchedAnimals = vertMatchedAnimals;
        }
        db.collection('artifacts').doc(appId).collection('student_drafts').doc(docId).set(draftData)
          .then(() => {
            alert('💾 進度儲存成功！下次使用同班級、座號、姓名登入即可繼續挑戰。');
          })
          .catch(err => alert('儲存失敗：' + err.message))
          .finally(() => setIsSavingProgress(false));
      };

      const handleRestartGame = () => {
        if (window.confirm("⚠️ 確定要重新開始挑戰嗎？這將會清空本單元目前的所有進度並重新洗牌。")) {
          setWrongCount(0);
          setIsQuizSubmitted(false);
          setUserQuizAnswers({});
          setFinalQuizScore(0);
          setSelectedCard(null);
          setMatchedCards([]);
          setVertMatchedFeatures([]);
          setVertMatchedAnimals([]);
          setSelectedVertFeature(null);
          setSelectedVertAnimal(null);
          setSeed(prev => prev + 1);
          const docId = `${studentClass}_${studentSeat}_${studentName}_${gameMode}`;
          db.collection('artifacts').doc(appId).collection('student_drafts').doc(docId).delete().catch(()=>{});
          alert('🔄 遊戲已初始化，卡牌已重新打亂！開始吧！');
        }
      };

      const handleLogin = (role) => {
        if (role === 'teacher') {
          const password = prompt('🔑 請輸入教師管理密碼：');
          if (password === 'bio123') {
            setUserRole('teacher_admin');
          } else {
            alert('❌ 密碼錯誤！');
          }
          return;
        }
        if (!studentName.trim() || !studentSeat.trim()) {
          alert('⚠️ 請完整輸入 班級、座號 與 姓名！');
          return;
        }
        setUserRole('lobby');
      };

      const handleInvertCardClick = (card) => {
        if (errorCardId) return;
        if (!selectedCard) {
          setSelectedCard(card);
        } else {
          if (selectedCard.id === card.id) {
            setSelectedCard(null);
            return;
          }
          if (selectedCard.type !== card.type && selectedCard.target === card.target) {
            setMatchedCards(prev => [...prev, selectedCard, card]);
            setSelectedCard(null);
          } else {
            setErrorCardId(card.id);
            const prevId = selectedCard.id;
            setWrongCount(prev => prev + 1);
            setTimeout(() => {
              setErrorCardId(null);
              setSelectedCard(null);
            }, 800);
          }
        }
      };

      const handleVertCategoryClick = (categoryKey) => {
        if (vertFeatureErrorId || vertAnimalErrorId) return;
        if (vertSubTab === 'feature' && shuffledVertFeatures.length > 0) {
          const currentFeature = shuffledVertFeatures[0];
          if (currentFeature.target === categoryKey) {
            setVertMatchedFeatures(prev => [...prev, currentFeature]);
          } else {
            setVertFeatureErrorId(categoryKey);
            setWrongCount(prev => prev + 1);
            setTimeout(() => setVertFeatureErrorId(null), 800);
          }
        } else if (vertSubTab === 'animal' && poolVertAnimals.length > 0) {
          const currentAnimal = poolVertAnimals[0];
          if (currentAnimal.target === categoryKey) {
            setVertMatchedAnimals(prev => [...prev, currentAnimal]);
          } else {
            setVertAnimalErrorId(categoryKey);
            setWrongCount(prev => prev + 1);
            setTimeout(() => setVertAnimalErrorId(null), 800);
          }
        }
      };

      const handleQuizAnswerSelect = (qId, optionIndex) => {
        if (isQuizSubmitted) return;
        setUserQuizAnswers(prev => ({ ...prev, [qId]: optionIndex }));
      };

      const handleSubmitQuiz = () => {
        const quizData = gameMode === 'invert' ? INVERT_QUIZ_DATA : VERT_QUIZ_DATA;
        let correctCount = 0;
        quizData.forEach(q => {
          if (userQuizAnswers[q.id] === q.answer) correctCount++;
        });
        const score = Math.round((correctCount / quizData.length) * 100);
        setFinalQuizScore(score);
        setIsQuizSubmitted(true);

        const scoreRecord = {
          class: studentClass,
          seat: studentSeat.padStart(2, '0'),
          name: studentName,
          chapterName: gameMode === 'invert' ? '無脊椎動物' : '脊椎動物',
          matchScore: matchScore,
          quizScore: score,
          totalScore: Math.round((matchScore + score) / 2),
          time: new Date().toLocaleString(),
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        db.collection('artifacts').doc(appId).collection('student_scores').add(scoreRecord)
          .then(() => {
            const draftDocId = `${studentClass}_${studentSeat}_${studentName}_${gameMode}`;
            db.collection('artifacts').doc(appId).collection('student_drafts').doc(draftDocId).delete().catch(()=>{});
            alert(`🎉 測驗提交成功！\n配對得分：${matchScore} 分\n測驗得分：${score} 分\n綜合成績：${scoreRecord.totalScore} 分\n已成功上傳雲端資料庫！`);
          })
          .catch(err => alert('資料上傳失敗：' + err.message));
      };

      const toggleConfig = (field) => {
        const nextVal = !config[field];
        db.collection('artifacts').doc(appId).collection('public').doc('config').set({
          ...config,
          [field]: nextVal
        }).then(() => {
          setConfig(prev => ({ ...prev, [field]: nextVal }));
        }).catch(err => console.log(err));
      };

      const clearAllScores = () => {
        if (window.confirm("🚨 警告：這將會永久清空雲端資料庫中的『所有學生作答成績欄位』！\n確定要執行清除嗎？")) {
          db.collection('artifacts').doc(appId).collection('student_scores').get()
            .then((snapshot) => {
              const batch = db.batch();
              snapshot.forEach(doc => batch.delete(doc.ref));
              return batch.commit();
            })
            .then(() => alert("✅ 雲端所有成績紀錄已清空！"))
            .catch(err => alert("清除失敗: " + err.message));
        }
      };

      // UI 渲染：登入畫面
      if (userRole === 'login') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
            <div className="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full border border-slate-200">
              <div className="text-center mb-6">
                <span className="text-4xl">🧬</span>
                <h1 className="text-xl font-black text-slate-800 mt-2">國中生物動物界學習網</h1>
                <p className="text-xs text-slate-400 mt-1">互動式學習探索與即時雲端後台</p>
              </div>
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">班級</label>
                  <select value={studentClass} onChange={e=>setStudentClass(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    {CLASS_OPTIONS.map(c => <option key={c} value={c}>{c} 班</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">座號</label>
                    <input type="number" placeholder="例如: 05" value={studentSeat} onChange={e=>setStudentSeat(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold focus:outline-none focus:ring-2 focus:ring-blue-500" />
                  </div>
                  <div>

                <div className={`p-4 rounded-xl border-2 transition-all ${config.vertebrateOpen ? 'border-blue-200 bg-blue-50/40 hover:shadow-md cursor-pointer' : 'border-slate-200 bg-slate-50 opacity-60'}`} onClick={() => config.vertebrateOpen && startChapter('vert')}>

                  </div>
                </div>
              </div>

                        <div className="mb-4 border-b border-slate-100 pb-2">
                          <h4 className="text-sm font-black text-slate-800">🧬 脊椎動物五大類「核心構造特徵」歸類</h4>
                          <p className="text-[11px] text-slate-400 mt-0.5">玩法：觀察中間那張黃色待分類的「特徵卡」，點選下方正確的「五大類別籃子」將牠放入！</p>
                        </div>

                        {shuffledVertFeatures.length === 0 ? (
                          <div className="text-center p-8 bg-blue-50 text-blue-800 rounded-xl border border-blue-100 font-bold text-xs">
                            🎉 恭喜！五大類脊椎動物的所有核心結構、呼吸器官、受精方式特徵已全數正確歸類完畢！快切換上方分頁進行實體動物圖片歸類吧！
                          </div>
                        ) : (
                          <div className="space-y-4">
                            {/* 中央出牌區 */}
                            <div className="flex justify-center">
                              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-4 max-w-sm w-full text-center shadow-sm animate-bounce">
                                <span className="text-[10px] font-bold text-amber-700 bg-amber-200/60 px-2 py-0.5 rounded-full uppercase">請將此卡歸類</span>
                                <p className="mt-2 text-slate-800 font-black text-sm min-h-[40px] flex items-center justify-center">{shuffledVertFeatures[0].text}</p>
                              </div>
                            </div>
                            {/* 下方五大籃子區 */}
                            <div className="grid grid-cols-2 sm:grid-cols-5 gap-2">
                              {Object.entries(VERT_FEATURE_META).map(([key, meta]) => (
                                <div
                                  key={key}
                                  onClick={() => handleVertCategoryClick(key)}
                                  className={`p-3 rounded-xl border-2 text-center cursor-pointer font-black text-xs transition-all active:scale-95 ${
                                    vertFeatureErrorId === key ? 'border-rose-500 bg-rose-100 text-rose-800 animate-shake' : 'border-slate-200 bg-slate-50 text-slate-700 hover:bg-blue-50 hover:border-blue-400'
                                  }`}
                                >
                                  <div className="text-xl mb-1">{meta.icon}</div>
                                  <div>{meta.name}</div>
                                  <div className="text-[10px] font-bold text-slate-400 mt-1 bg-white border rounded py-0.5">
                                    已收納 {vertMatchedFeatures.filter(f => f.target === key).length} 項
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    {/* 階段 B：生物圖片歸類介面 */}
                    {vertSubTab === 'animal' && (
                      <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                        <div className="mb-4 border-b border-slate-100 pb-2">
                          <h4 className="text-sm font-black text-slate-800">🖼️ 實體動物「真實圖片與亞綱」精準分類</h4>
                          <p className="text-[11px] text-slate-400 mt-0.5">說明：依據中央出現的真實動物影像或名稱，判斷其屬於軟骨魚、硬骨魚或兩生、爬蟲、鳥、哺乳類籃子。</p>
                        </div>

                        {poolVertAnimals.length === 0 ? (
                          <div className="text-center p-8 bg-emerald-50 text-emerald-800 rounded-xl border border-emerald-100 font-bold text-xs">
                            🎉 太厲害了！包含軟硬骨魚、多種胎卵生哺乳類及兩生爬蟲類的實體生物圖片，已全數正確分類！請點選上方分頁進行【自我隨堂測驗】！
                          </div>
                        ) : (
                          <div className="space-y-4">
                            {/* 中央出牌區 */}
                            <div className="flex justify-center">
                              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 max-w-xs w-full text-center shadow-md">
                                <span className="text-[10px] font-bold text-emerald-700 bg-emerald-200 px-2 py-0.5 rounded-full block mx-auto w-max">此生物屬於哪一類？</span>
                                <h5 className="mt-1.5 text-base font-black text-slate-900">{poolVertAnimals[0].name}</h5>
                                <div className="mt-2 w-full h-28 bg-slate-100 rounded-lg overflow-hidden border border-slate-200 flex items-center justify-center relative">
                                  <img src={poolVertAnimals[0].img} alt={poolVertAnimals[0].name} className="w-full h-full object-cover" onError={(e)=>{e.target.style.display='none'}} />
                                  <span className="absolute text-3xl opacity-40">🐾</span>
                                </div>
                              </div>
                            </div>
                            {/* 下方六大籃子區 */}
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2">
                              {Object.entries(VERT_ANIMAL_META).map(([key, meta]) => (
                                <div
                                  key={key}
                                  onClick={() => handleVertCategoryClick(key)}
                                  className={`p-2.5 rounded-xl border-2 text-center cursor-pointer font-black text-xs transition-all active:scale-95 ${
                                    vertAnimalErrorId === key ? 'border-rose-500 bg-rose-100 text-rose-800 animate-shake' : 'border-slate-200 bg-slate-50 text-slate-700 hover:bg-emerald-50 hover:border-emerald-400'
                                  }`}
                                >
                                  <div className="text-xl mb-1">{meta.icon}</div>
                                  <div className="leading-tight">{meta.name}</div>
                                  <div className="text-[10px] font-bold text-slate-400 mt-1 bg-white border rounded py-0.5">
                                    已分類 {vertMatchedAnimals.filter(f => f.target === key).length} 隻
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* 功能分頁內容：自我隨堂測驗 */}
            {activeTab === 'quiz' && (
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                <div className="border-b border-slate-100 pb-3 flex flex-col sm:flex-row justify-between sm:items-center gap-2">
                  <div>
                    <h2 className="text-base font-black text-slate-800">📝 當堂單元自我核心素養檢測</h2>
                    <p className="text-xs text-slate-400 mt-0.5">共 10 題單選題。提交後系統會自動批改並將總成績即時上傳給授課老師。</p>
                  </div>
                  {isQuizSubmitted && (
                    <div className="text-right">
                      <span className="text-[10px] font-bold text-slate-400 block">您的測驗最終得分</span>
                      <span className="text-xl font-black text-blue-600 font-mono">{finalQuizScore} <span className="text-xs text-slate-500">分</span></span>
                    </div>
                  )}
                </div>

                <div className="space-y-5">
                  {quizData.map((q, qIdx) => {
                    const isCorrect = userQuizAnswers[q.id] === q.answer;
                    return (
                      <div key={q.id} className={`p-4 rounded-xl border transition-all ${isQuizSubmitted ? (isCorrect ? 'bg-emerald-50/50 border-emerald-200' : 'bg-rose-50/50 border-rose-200') : 'bg-slate-50 border-slate-200'}`}>
                        <span className="text-[10px] font-mono bg-slate-200 text-slate-700 px-2 py-0.5 rounded font-bold">第 {qIdx + 1} 題</span>
                        <h4 className="font-bold text-sm text-slate-800 mt-1.5 leading-snug">{q.question}</h4>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-3">
                          {q.options.map((option, optIdx) => {
                            const isSelected = userQuizAnswers[q.id] === optIdx;
                            const isAnswerKey = q.answer === optIdx;
                            return (
                              <button
                                key={optIdx}
                                onClick={() => handleQuizAnswerSelect(q.id, optIdx)}
                                disabled={isQuizSubmitted}
                                className={`p-2.5 rounded-lg text-left text-xs font-semibold border transition-all flex items-center justify-between ${
                                  isQuizSubmitted ? (
                                    isAnswerKey ? 'bg-emerald-600 border-emerald-600 text-white font-black' : 
                                    isSelected ? 'bg-rose-100 border-rose-300 text-rose-800' : 'bg-white border-slate-200 text-slate-400 opacity-60'
                                  ) : (
                                    isSelected ? 'bg-blue-600 border-blue-600 text-white font-black shadow-sm' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-100'
                                  )
                                }`}
                              >
                                <span>{String.fromCharCode(65 + optIdx)}. {option}</span>
                                {isQuizSubmitted && isAnswerKey && <span>✅ 正確答案</span>}
                                {isQuizSubmitted && isSelected && !isAnswerKey && <span>❌ 你的選擇</span>}
                              </button>
                            );
                          })}
                        </div>
                        {isQuizSubmitted && (
                          <div className={`mt-3 p-2.5 rounded-lg text-[11px] leading-relaxed border font-medium ${isCorrect ? 'bg-emerald-100/40 text-emerald-800 border-emerald-200' : 'bg-rose-100/40 text-rose-800 border-rose-200'}`}>
                            💡 <span className="font-bold">名師解析：</span>{q.explanation}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* 提交按鈕 */}
                <div className="pt-4 border-t border-slate-100 flex justify-center">
                  {isQuizSubmitted ? (
                    <div className="text-center space-y-2">
                      <p className="text-xs text-slate-500 font-bold">🎉 成績已成功登錄至老師的管理後台！</p>
                      <button onClick={() => setUserRole('lobby')} className="bg-slate-800 hover:bg-slate-900 text-white font-black text-xs px-6 py-2.5 rounded-xl transition-all shadow">
                        返回大廳挑戰其他單元
                      </button>
                    </div>
                  ) : (
                    <button
                      onClick={() => {
                        const answeredCount = Object.keys(userQuizAnswers).length;
                        if (answeredCount < quizData.length) {
                          if (!window.confirm(`⚠️ 你還有 ${quizData.length - answeredCount} 題尚未作答！\n未作答的題目將會以 0 分計算，確定要直接交卷嗎？`)) return;
                        } else {
                          if (!window.confirm("✍️ 確定檢查完畢要交卷了嗎？交卷後將無法修改答案囉！")) return;
                        }
                        handleSubmitQuiz();
                      }}
                      className="bg-blue-600 hover:bg-blue-700 text-white font-black text-sm px-10 py-3 rounded-xl shadow-md transition-all active:scale-95"
                    >
                      🔒 檢查完畢，確認交卷上傳成績
                    </button>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
